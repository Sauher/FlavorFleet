<div class="profile-page">

 <section class="profile-hero">
  <div class="profile-head">
    <p-avatar [image]="user.pictureURL" size="xlarge" shape="circle"></p-avatar>

    <div class="profile-id">
      <div class="name">{{ user.name }}</div>
      <div class="email">{{ user.email }}</div>

      <div class="profile-actions">
        <button pButton class="p-button-link" icon="pi pi-user-edit" label="Profil szerkesztése"
          (click)="openEditProfile()"></button>

        <button pButton class="p-button-link" icon="pi pi-lock" label="Jelszó módosítása"
          (click)="openChangePassword()"></button>
      </div>
    </div>
  </div>
</section>

  <section class="section">
    <div class="section-title">Személyes adatok</div>

    <p-card styleClass="panel-card">
      <div class="rows">
        <div class="row">
          <div class="left">
            <div class="row-title">
              <i class="pi pi-map-marker"></i>
              <span>Címek</span>
            </div>
            <div class="row-sub">{{ addresses.length }} Mentett cím</div>
          </div>

          <button
            pButton
            label="Megtekintés"
            class="btn-view"
            (click)="viewAddresses()"
          ></button>
        </div>

        <div class="row" *ngIf="addresses.length > 0" style="display:none"></div>

        <div class="row">
          <div class="left">
            <div class="row-title">
              <i class="pi pi-history"></i>
              <span>Rendeléstörténet</span>
            </div>
            <div class="row-sub">32 Teljesített rendelés</div>
          </div>
          <button
            pButton
            label="Megtekintés"
            class="btn-view"
            (click)="goToOrders()"
          ></button>
        </div>

      </div>
    </p-card>
  </section>

  <section class="section">
    <div class="section-title">Kedvencek</div>

    <div class="grid fav-grid">
      <div class="col-12 md:col-4" *ngFor="let f of favorites">
        <p-card styleClass="fav-card">
          <ng-template pTemplate="header">
            <div class="fav-img">
              <img [src]="f.imageUrl" [alt]="f.name" />
            </div>
          </ng-template>

          <div class="fav-body">
            <div class="fav-name">{{ f.name }}</div>

            <div class="fav-meta">
              <p-rating [(ngModel)]="f.rating" [readonly]="true" ></p-rating>

              <div class="fav-eta">
                <i class="pi pi-clock"></i>
                <span>{{ f.etaMin }}m</span>
              </div>
            </div>

            <button
              pButton
              icon="pi pi-search"
              label="Részletek"
              class="btn-details p-button-outlined"
              (click)="openFavorite(f)"
            ></button>
          </div>
        </p-card>
      </div>
    </div>
  </section>
</div>

<p-dialog
  header="Név és email szerkesztése"
  [(visible)]="editProfileVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '420px' }"
>
  <div class="dialog-form">
    <div class="field">
      <label>Név</label>
      <input pInputText class="w-full" [(ngModel)]="editUser.name" />
    </div>

    <div class="field">
      <label>Email</label>
      <input pInputText class="w-full" [(ngModel)]="editUser.email" />
    </div>

     <p-avatar [image]="editUser.pictureURL" size="xlarge" shape="circle" class="animate-fadeinup"></p-avatar>
        <p-button
        uploadButton
        [uploadComplete]="onComplete"
        [uploadOptions]="options"
        [uploader]="uploader"
        >
        Upload a file...
        </p-button>

    <div class="dialog-actions">
      <button pButton label="Mégse" class="p-button-outlined" (click)="editProfileVisible=false"></button>
      <button pButton label="Mentés" icon="pi pi-check" (click)="saveProfile()"></button>
    </div>
  </div>
</p-dialog>


<!-- ── Addresses list dialog ── -->
<p-dialog
  header="Mentett címek"
  [(visible)]="addressesVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '520px', maxWidth: '95vw' }"
>
  <div class="dialog-form">
    <div class="address-list" *ngIf="addresses.length > 0">
      <div class="address-item" *ngFor="let addr of addresses">
        <div class="address-text">
          <i class="pi pi-map-marker"></i>
          <span>{{ addr.useraddress }}</span>
        </div>
        <div class="address-actions">
          <button pButton icon="pi pi-pencil" class="p-button-text p-button-sm" (click)="openEditAddress(addr)"></button>
          <button pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="deleteAddress(addr)"></button>
        </div>
      </div>
    </div>

    <div *ngIf="addresses.length === 0" class="empty-addresses">
      <i class="pi pi-map-marker" style="font-size: 2rem; opacity: 0.4"></i>
      <p>Még nincs mentett cím.</p>
    </div>

    <div class="dialog-actions">
      <button pButton label="Bezárás" class="p-button-outlined" (click)="addressesVisible=false"></button>
      <button pButton label="Új cím" icon="pi pi-plus" (click)="openAddAddress()"></button>
    </div>
  </div>
</p-dialog>

<!-- ── Add / Edit address dialog ── -->
<p-dialog
  [header]="editingAddressId ? 'Cím szerkesztése' : 'Új cím hozzáadása'"
  [(visible)]="editAddressVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '420px', maxWidth: '95vw' }"
>
  <div class="dialog-form">
    <div class="field">
      <label>Cím</label>
      <input pInputText class="w-full" [(ngModel)]="editAddressModel.useraddress" placeholder="Pl. 1234 Budapest, Fő utca 1." />
    </div>

    <div class="dialog-actions">
      <button pButton label="Mégse" class="p-button-outlined" (click)="editAddressVisible=false"></button>
      <button pButton label="Mentés" icon="pi pi-check" (click)="saveAddress()"></button>
    </div>
  </div>
</p-dialog>

<p-dialog
  header="Jelszó módosítása"
  [(visible)]="changePasswordVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '420px' }"
>
  <div class="dialog-form">
    <div class="field">
      <label>Új jelszó</label>
      <p-password
        [(ngModel)]="passwordModel.password"
        [toggleMask]="true"
        [feedback]="false"
        inputStyleClass="w-full"
      ></p-password>
    </div>

    <div class="field">
      <label>Jelszó megerősítése</label>
      <p-password
        [(ngModel)]="passwordModel.confirm"
        [toggleMask]="true"
        [feedback]="false"
        inputStyleClass="w-full"
      ></p-password>
    </div>

    <div class="dialog-actions">
      <button pButton label="Mégse" class="p-button-outlined" (click)="changePasswordVisible=false"></button>
      <button pButton label="Mentés" icon="pi pi-check" (click)="savePassword()"></button>
    </div>
  </div>
</p-dialog>
